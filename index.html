<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KD Kannu Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #322D29;
  color: #EFE9E1;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px;
}

.logo {
  width: 130px;
}

/* SECTION */
section {
  padding: 50px 20px;
  max-width: 900px;
  margin: auto;
}

.box {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
}

/* SLIDER */
.slider {
  position: relative;
}

.img {
  width: 100%;
  display: block;
  border-radius: 10px;
}

.after {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

input[type="range"] {
  width: 100%;
  margin-top: 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
.btn {
  background: #72383D;
  padding: 10px 15px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

/* FLOAT BUTTONS */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
}

.instagram {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #E1306C;
  padding: 15px;
  border-radius: 50%;
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>KD KANNU DESIGNS</h1>
  <p>UI & Graphic Designer</p>
</header>

<!-- IMAGE EDITING -->
<section>
  <h2>Image Editing (Before / After)</h2>
  <div class="box">

    <div class="slider">
      <img src="before.jpg" class="img">

      <div class="after" id="after">
        <img src="after.jpg" class="img">
      </div>

      <input type="range" min="0" max="100" value="50" id="range">
    </div>

  </div>
</section>

<!-- WORK -->
<section>
  <h2>My Work</h2>
  <div class="box gallery">
    <img src="mockup.jpg">
  </div>
</section>

<!-- VIDEO -->
<section>
  <h2>Prototype Video</h2>
  <div class="box">
    <video controls>
      <source src="ZA.mp4" type="video/mp4">
    </video>
  </div>
</section>

<!-- DOCUMENTS -->
<section>
  <h2>Documents</h2>
  <div class="box">
    <a href="resume.pdf" class="btn">View Resume</a><br><br>
    <a href="certificate.pdf" class="btn">View Certificate</a>
  </div>
</section>

<!-- CONTACT -->
<section>
  <h2>Contact</h2>
  <div class="box">
    <p>📞 9566951885</p>
    <p>📧 kannubusiness@gmail.com</p>
    <p>📸 @kd_kannu_designs</p>
  </div>
</section>

<footer>
  © 2026 KD Kannu Designs
</footer>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/919566951885?text=Hi%20I%20saw%20your%20portfolio" class="whatsapp">💬</a>

<a href="https://ig.me/m/kd_kannu_designs" class="instagram">📸</a>

<script>
const range = document.getElementById("range");
const after = document.getElementById("after");

range.oninput = () => {
  after.style.width = range.value + "%";
};
</script>

</body>
</html>
